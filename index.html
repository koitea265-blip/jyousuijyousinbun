<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浄水場新聞メーカー</title>
    
    <!-- 
      【オフライン（インターネット未接続環境）運用の注意】
      学校の共有サーバー等がインターネットに繋がっていない場合、以下のCDNリンクは機能しません。
      その場合は、それぞれのURL先からファイルをPCにダウンロードし、
      以下のように同じフォルダからの相対パス（例: ./react.production.min.js）に書き換えてください。
    -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" onerror="handleCdnError('React')"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onerror="handleCdnError('React DOM')"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" onerror="handleCdnError('Babel')"></script>
    <script src="https://cdn.tailwindcss.com" onerror="handleCdnError('Tailwind CSS')"></script>
    
    <script>
        // CDNロードエラー時のハンドリング（真っ白な画面、フリーズを防ぐ）
        const cdnErrors = [];
        function handleCdnError(libName) {
            cdnErrors.push(libName);
            window.addEventListener('DOMContentLoaded', () => {
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = `
                        <div style="padding: 20px; font-family: sans-serif; text-align: center; color: #dc2626;">
                            <h2 style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">じゅんびエラー</h2>
                            <p style="font-weight: bold;">[ ${cdnErrors.join(', ')} ] の読み込みに失敗しました。</p>
                            <p style="color: #4b5563; font-size: 14px; margin-top: 10px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.6;">
                                <strong>【原因1】</strong> 学校の共有フォルダ・サーバーがインターネットに繋がっていません。<br>
                                <strong>【解決策】</strong> インターネットに繋がる環境でこの新聞メーカーを実行するか、ライブラリファイルを事前にダウンロードしてHTML内の読み込みパスを相対パスに書き換えてください。<br><br>
                                <strong>【原因2】</strong> file://プロトコル制限によるセキュリティブロック。<br>
                                <strong>【解決策】</strong> フォルダ内のファイルを直接ダブルクリックするのではなく、簡易Webサーバーを立ち上げて「http://」からアクセスしてください。
                            </p>
                        </div>
                    `;
                }
            });
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;900&family=Noto+Sans+JP:wght@400;900&display=swap');
        body { background-color: #f3f4f6; color: black; font-family: 'Noto Serif JP', serif; overflow-x: hidden; }
        .font-sans { font-family: 'Noto Sans JP', sans-serif !important; }
        .font-serif { font-family: 'Noto Serif JP', serif !important; }
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .a4-paper { box-shadow: none !important; border: none !important; padding: 10mm !important; margin: 0 !important; width: 210mm !important; height: 297mm !important; }
        }
        .vertical-text { writing-mode: vertical-rl; text-orientation: upright; }
        [contenteditable]:focus { outline: 2px solid #3b82f6; border-radius: 2px; }
        .no-scroll { overflow: hidden !important; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .overflow-danger { background-color: #fee2e2 !important; transition: background-color 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKのローカル用フォールバック設定 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        window.firebase = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, getDoc };
    </script>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';
        const initialToken = window.__initial_auth_token;

        const initFirebase = () => {
            if (!window.firebase || !firebaseConfig.apiKey) return null; // 設定がない場合はローカルスタンドアロン動作
            try {
                const app = window.firebase.initializeApp(firebaseConfig);
                const auth = window.firebase.getAuth(app);
                const db = window.firebase.getFirestore(app);
                return { auth, db };
            } catch (e) {
                console.warn("Firebaseの初期化に失敗しました。スタンドアロンで動作します。", e);
                return null;
            }
        };

        const Icon = ({ name, className = "" }) => {
            const icons = {
                save: <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8" />,
                "file-down": <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2zM14 2v6h6M12 18v-6M9 15l3 3 3-3" />,
                "loader-2": <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                "check-circle": <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4 12 14.01l-3-3" />,
                "alert-triangle": <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3ZM12 9v4M12 17h.01" />,
                camera: <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3zM12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
            };
            return ( <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`lucide lucide-${name} ${className}`}>{icons[name]}</svg> );
        };

        const WarningModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center border-4 border-red-500 text-black">
                        <Icon name="alert-triangle" className="w-16 h-16 text-red-500 mx-auto mb-4" />
                        <h3 className="text-2xl font-black font-sans mb-4">まだはみ出しているよ！</h3>
                        <p className="text-gray-600 font-bold mb-8 font-sans leading-relaxed text-center text-black">
                            これ以上書くと、文字がきえてしまいます。<br/>少しだけ文字をへらしてね。
                        </p>
                        <button onClick={onClose} className="bg-gray-900 hover:bg-black text-white font-black py-4 px-10 rounded-2xl shadow-lg active:scale-95 transition-all w-full font-sans text-lg text-white">
                            わかった！
                        </button>
                    </div>
                </div>
            );
        };

        const ImageCropper = ({ src, onCrop, onClose, targetWidth, targetHeight }) => {
            const [scale, setScale] = useState(1);
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const canvasRef = useRef(null);
            const imgRef = useRef(new Image());

            useEffect(() => {
                if (src) {
                    imgRef.current.src = src;
                    imgRef.current.onload = () => {
                        const sX = targetWidth / imgRef.current.width;
                        const sY = targetHeight / imgRef.current.height;
                        const initS = Math.max(sX, sY);
                        setScale(initS);
                        setPosition({ x: (targetWidth - imgRef.current.width * initS) / 2, y: (targetHeight - imgRef.current.height * initS) / 2 });
                    };
                }
            }, [src, targetWidth, targetHeight]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || !imgRef.current.src) return;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#f3f4f6';
                ctx.fillRect(0, 0, targetWidth, targetHeight);
                ctx.drawImage(imgRef.current, position.x, position.y, imgRef.current.width * scale, imgRef.current.height * scale);
            }, [scale, position, src, targetWidth, targetHeight]);

            const onMD = (e) => { setIsDragging(true); setDragStart({ x: e.clientX - position.x, y: e.clientY - position.y }); };
            const onMM = (e) => { if (isDragging) setPosition({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }); };

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[400] no-print p-4 backdrop-blur-sm">
                    <div className="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center max-w-md w-full text-black">
                        <h3 className="text-xl font-bold mb-4 font-sans text-black">写真の範囲をえらぶ</h3>
                        <div 
                            className="relative overflow-hidden border-2 border-gray-200 cursor-move bg-gray-100 rounded-lg shadow-inner" 
                            style={{ width: '280px', height: '373px' }}
                            onMouseDown={onMD} onMouseMove={onMM} onMouseUp={() => setIsDragging(false)} onMouseLeave={() => setIsDragging(false)}
                        >
                            <canvas ref={canvasRef} width={targetWidth} height={targetHeight} className="w-full h-full pointer-events-none" />
                        </div>
                        <div className="mt-8 w-full flex items-center space-x-4 px-2">
                            <span className="text-xs font-sans font-bold text-gray-500">小さく</span>
                            <input type="range" min="0.1" max="3" step="0.02" value={scale} onChange={(e) => setScale(parseFloat(e.target.value))} className="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                            <span className="text-xs font-sans font-bold text-gray-500">大きく</span>
                        </div>
                        <div className="mt-8 flex gap-3 font-sans w-full text-black">
                            <button onClick={onClose} className="flex-1 py-3 border border-gray-300 rounded-xl font-bold text-black text-center">やめる</button>
                            <button onClick={() => onCrop(canvasRef.current.toDataURL('image/jpeg', 0.8))} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg text-center text-white">これでOK！</button>
                        </div>
                    </div>
                </div>
            );
        };

        const AutoFitText = ({ value, onChange, placeholder, onOverflowStateChange, className = "" }) => {
            const elRef = useRef(null);
            const [lineHeight, setLineHeight] = useState(1.35);
            const [isDanger, setIsDanger] = useState(false);

            const adjustAndCheck = useCallback(() => {
                const el = elRef.current;
                if (!el) return;
                el.style.lineHeight = "1.15";
                const isTrueOverflow = el.scrollWidth > el.clientWidth + 8; 
                if (isTrueOverflow) {
                    setIsDanger(true);
                    onOverflowStateChange(true);
                    setLineHeight(1.15);
                } else {
                    setIsDanger(false);
                    onOverflowStateChange(false);
                    el.style.lineHeight = "1.35";
                    if (el.scrollWidth > el.clientWidth + 5) {
                        setLineHeight(1.15);
                    } else {
                        setLineHeight(1.35);
                    }
                }
            }, [onOverflowStateChange]);

            useEffect(() => { adjustAndCheck(); }, [value, adjustAndCheck]);

            return (
                <div 
                    ref={elRef}
                    contentEditable suppressContentEditableWarning 
                    onInput={(e) => { onChange(e.currentTarget.textContent); adjustAndCheck(); }}
                    className={`vertical-text no-scroll ${isDanger ? 'overflow-danger' : ''} ${className}`}
                    style={{ lineHeight: lineHeight, transition: 'line-height 0.2s ease' }}
                    placeholder={placeholder}
                >
                    {value}
                </div>
            );
        };

        const ImageBlock = ({ image, onImageChange, className }) => {
            const [imageSrc, setImageSrc] = useState(null);
            const [isCropping, setIsCropping] = useState(false);
            const fileInputRef = useRef(null);
            const targetWidth = 600; 
            const targetHeight = 800;

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setImageSrc(e.target.result);
                        setIsCropping(true);
                    };
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className={`relative ${className} h-full`}>
                    <div 
                        className={`w-full h-full flex items-center justify-center cursor-pointer transition-all overflow-hidden absolute inset-0 rounded ${image ? 'border-none bg-transparent' : 'bg-gray-50 border-2 border-dashed border-gray-300 hover:border-blue-300'}`} 
                        onClick={() => fileInputRef.current.click()}
                    >
                        {image ? <img src={image} alt="Article" className="w-full h-full object-cover" /> : (
                            <div className="text-gray-400 flex flex-col items-center text-center p-2 group text-black">
                                <Icon name="camera" className="w-5 h-5 mb-1" />
                                <span className="no-print font-sans text-[10px] font-bold">写真をのせる</span>
                            </div>
                        )}
                    </div>
                    <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" className="hidden" />
                    {isCropping && (
                        <ImageCropper 
                            src={imageSrc} targetWidth={targetWidth} targetHeight={targetHeight}
                            onCrop={(url) => { onImageChange(url); setIsCropping(false); }} 
                            onClose={() => setIsCropping(false)} 
                        />
                    )}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [saveStatus, setSaveStatus] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [modalOpen, setModalOpen] = useState(false);
            const [globalOverflow, setGlobalOverflow] = useState(false);
            const firebaseServices = useRef(null);
            const modalTimerRef = useRef(null);

            const [newsTitle, setNewsTitle] = useState("浄水場新聞");
            const [info, setInfo] = useState({ school: "〇〇小学校", class: "〇年〇組", name: "名前〇〇" });
            const [articles, setArticles] = useState([{ headline: "【見出し】メイン記事", sub: "小見出し", content: "記事を入力してください。", image: null }, { content: "中段の記事を入力してください。", image: null }, { headline: "【見出し】下段の見出し", content: "下段の記事を入力してください。", image: null }]);
            const [reflection, setReflection] = useState("まとめ・ふりかえり");
            const containerRef = useRef(null);
            const titleTextRef = useRef(null);
            const [fontSize, setFontSize] = useState('5rem');

            useEffect(() => {
                const init = async () => {
                    const svcs = initFirebase(); 
                    if (!svcs) {
                        // スタンドアロン（ローカル保存）用ダミーユーザー設定
                        setUser({ uid: "local-user" });
                        setIsLoading(false);
                        return;
                    }
                    firebaseServices.current = svcs;
                    try { if (initialToken) await window.firebase.signInWithCustomToken(svcs.auth, initialToken); else await window.firebase.signInAnonymously(svcs.auth); } catch (e) {}
                    return window.firebase.onAuthStateChanged(svcs.auth, setUser);
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !firebaseServices.current) return;
                const fetch = async () => {
                    setIsLoading(true);
                    try {
                        const snap = await window.firebase.getDoc(window.firebase.doc(firebaseServices.current.db, 'artifacts', appId, 'users', user.uid, 'settings', 'newspaper_data'));
                        if (snap.exists()) {
                            const d = snap.data();
                            if (d.newsTitle) setNewsTitle(d.newsTitle);
                            if (d.info) setInfo(d.info);
                            if (d.articles) setArticles(d.articles);
                            if (d.reflection !== undefined) setReflection(d.reflection);
                        }
                    } catch (e) {} finally { setIsLoading(false); }
                };
                fetch();
            }, [user]);

            const handleOverflowUpdate = useCallback((isOverflowing) => {
                setGlobalOverflow(isOverflowing);
                if (modalTimerRef.current) clearTimeout(modalTimerRef.current);
                if (isOverflowing) {
                    modalTimerRef.current = setTimeout(() => { setModalOpen(true); }, 4000); 
                }
            }, []);

            const save = async () => {
                if (globalOverflow) { setModalOpen(true); return; }
                
                // localStorageフォールバック（共有サーバー等で通信エラー時にも確実にセーブできるようにする）
                try {
                    localStorage.setItem('newspaper_local_data', JSON.stringify({ newsTitle, info, articles, reflection }));
                } catch(e) {}

                if (!user || !firebaseServices.current) {
                    setSaveStatus('success');
                    setTimeout(() => setSaveStatus(null), 3000);
                    return;
                }
                
                setIsSaving(true);
                try {
                    await window.firebase.setDoc(window.firebase.doc(firebaseServices.current.db, 'artifacts', appId, 'users', user.uid, 'settings', 'newspaper_data'), { newsTitle, info, articles, reflection, updatedAt: new Date().toISOString() });
                    setSaveStatus('success');
                    setTimeout(() => setSaveStatus(null), 3000);
                } catch (e) {} finally { setIsSaving(false); }
            };

            // ローカル保存データがあればマウント時に読み込む
            useEffect(() => {
                try {
                    const localData = localStorage.getItem('newspaper_local_data');
                    if (localData && (!firebaseServices.current)) {
                        const d = JSON.parse(localData);
                        if (d.newsTitle) setNewsTitle(d.newsTitle);
                        if (d.info) setInfo(d.info);
                        if (d.articles) setArticles(d.articles);
                        if (d.reflection !== undefined) setReflection(d.reflection);
                    }
                } catch(e) {}
            }, [isLoading]);

            const updateTitleSize = useCallback(() => {
                if (containerRef.current && titleTextRef.current) {
                    const rect = containerRef.current.getBoundingClientRect();
                    const fs = (rect.height * 0.88) / Math.max(newsTitle.length, 1);
                    setFontSize(`${fs}px`);
                    titleTextRef.current.style.transform = `scaleX(${Math.min(1.0, rect.width / fs)})`;
                }
            }, [newsTitle]);

            useEffect(() => {
                updateTitleSize();
                const obs = new ResizeObserver(updateTitleSize);
                if (containerRef.current) obs.observe(containerRef.current);
                return () => obs.disconnect();
            }, [updateTitleSize]);

            if (isLoading) return (
                <div className="min-h-screen flex items-center justify-center bg-white flex-col gap-4 text-black text-center">
                    <Icon name="loader-2" className="w-10 h-10 spinner text-blue-600" />
                    <p className="font-sans font-bold text-gray-600">じゅんび中...</p>
                </div>
            );

            return (
                <div className="min-h-screen py-8 flex flex-col items-center selection:bg-yellow-200 text-black">
                    <WarningModal isOpen={modalOpen} onClose={() => setModalOpen(false)} />
                    
                    <div className="fixed top-4 left-1/2 -translate-x-1/2 flex items-center gap-4 no-print z-[100] bg-white/95 backdrop-blur-md p-4 rounded-2xl shadow-2xl border border-gray-200 text-black">
                        <button onClick={save} disabled={isSaving} className={`flex items-center gap-2 font-bold py-2.5 px-6 rounded-xl transition-all shadow-lg active:scale-95 font-sans text-sm ${globalOverflow ? 'bg-red-200 text-red-700' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                            {isSaving ? <Icon name="loader-2" className="w-4 h-4 spinner" /> : <Icon name="save" className="w-4 h-4 text-white" />}
                            かいたところを保存
                        </button>
                        <button onClick={() => window.print()} className="flex items-center gap-2 bg-gray-900 hover:bg-black text-white font-bold py-2.5 px-6 rounded-xl transition-all shadow-lg active:scale-95 font-sans text-sm text-white">
                            <Icon name="file-down" className="w-4 h-4 text-white" />
                            PDF（いんさつ）にする
                        </button>
                        {saveStatus === 'success' && <div className="flex items-center gap-1.5 text-green-600 font-bold font-sans text-sm text-black"><Icon name="check-circle" className="w-4 h-4" /> ほぞんできたよ！</div>}
                    </div>

                    <div className="a4-paper bg-white shadow-[0_35px_60px_-15px_rgba(0,0,0,0.3)] relative overflow-hidden mt-16 text-black" style={{ width: '210mm', height: '297mm', padding: '10mm', boxSizing: 'border-box' }}>
                        <div className="w-full h-full border-[5px] border-black p-3 flex flex-col text-black">
                            
                            <div className="flex flex-row-reverse h-[70%] min-h-0 pb-3 text-black">
                                <div className="w-32 flex flex-col items-center p-0 ml-4 h-full shrink-0 bg-white text-black">
                                    <div ref={containerRef} className="flex-1 w-full border-[6px] border-double border-black bg-white grid place-items-center relative p-0 overflow-hidden text-black text-center text-black">
                                        <div ref={titleTextRef} className="font-black focus:bg-yellow-50 cursor-text text-black inline-block text-center text-black" contentEditable suppressContentEditableWarning onBlur={e => setNewsTitle(e.target.textContent)} style={{ writingMode: 'vertical-rl', textOrientation: 'upright', fontSize: fontSize, lineHeight: '1.1', whiteSpace: 'nowrap', margin: '0 auto', padding: '0', transformOrigin: 'center' }}>{newsTitle}</div>
                                    </div>
                                    <div className="w-full h-[25%] bg-gray-200 mt-5 p-3 text-lg border-2 border-black flex flex-row-reverse justify-start items-start shrink-0 font-bold font-sans text-black text-center text-black">
                                        <div contentEditable suppressContentEditableWarning onBlur={e => setInfo({...info, school: e.target.textContent})} className="vertical-text h-full">{info.school}</div>
                                        <div contentEditable suppressContentEditableWarning onBlur={e => setInfo({...info, class: e.target.textContent})} className="vertical-text h-full ml-1.5">{info.class}</div>
                                        <div contentEditable suppressContentEditableWarning onBlur={e => setInfo({...info, name: e.target.textContent})} className="vertical-text h-full ml-2.5">{info.name}</div>
                                    </div>
                                </div>

                                <div className="flex-1 flex flex-col min-w-0 h-full text-black">
                                    <div className="bg-black text-white w-full h-10 px-4 font-black flex items-center text-xl mb-3 shrink-0 font-sans text-center text-white" contentEditable suppressContentEditableWarning onBlur={e => { const n = [...articles]; n[0].headline = e.target.textContent; setArticles(n); }}>{articles[0].headline}</div>
                                    
                                    <div className="flex-1 flex flex-row-reverse min-h-0 gap-4 pb-2 text-black">
                                        <div className="vertical-text text-xl font-black bg-gray-200 px-3 py-1 h-full flex items-center shrink-0 font-sans border-r border-black text-center text-black" contentEditable suppressContentEditableWarning onBlur={(e) => { const n = [...articles]; n[0].sub = e.currentTarget.textContent; setArticles(n); }}>{articles[0].sub}</div>
                                        <AutoFitText 
                                            value={articles[0].content} 
                                            onChange={text => { const n = [...articles]; n[0].content = text; setArticles(n); }}
                                            onOverflowStateChange={handleOverflowUpdate}
                                            className="flex-1 text-lg font-medium focus:bg-yellow-50 h-full text-black"
                                        />
                                        <div className="shrink-0 flex flex-col justify-start h-full aspect-[3/4] text-black"><ImageBlock image={articles[0].image} onImageChange={url => { const n = [...articles]; n[0].image = url; setArticles(n); }} className="w-full" /></div>
                                    </div>

                                    <hr className="border-t-[4px] border-black my-2" />

                                    <div className="flex-1 flex flex-row-reverse min-h-0 pt-2 pb-0 gap-4 border-none items-end text-black">
                                        <div className="shrink-0 flex flex-col justify-end h-full aspect-[3/4] text-black">
                                            <ImageBlock image={articles[1].image} onImageChange={url => { const n = [...articles]; n[1].image = url; setArticles(n); }} className="w-full h-full" />
                                        </div>
                                        <AutoFitText 
                                            value={articles[1].content} 
                                            onChange={text => { const n = [...articles]; n[1].content = text; setArticles(n); }}
                                            onOverflowStateChange={handleOverflowUpdate}
                                            className="flex-1 text-lg font-medium focus:bg-yellow-50 h-full text-black"
                                        />
                                    </div>
                                </div>
                            </div>

                            <hr className="border-t-[4px] border-black my-2" />

                            <div className="flex flex-row-reverse flex-1 min-h-0 pt-3 gap-4 text-black">
                                <div className="flex-1 flex flex-col min-w-0 text-black">
                                    <div className="bg-black text-white w-full h-10 px-4 font-black flex items-center text-xl mb-3 shrink-0 font-sans text-center text-white" contentEditable suppressContentEditableWarning onBlur={(e) => { const n = [...articles]; n[2].headline = e.currentTarget.textContent; setArticles(n); }}>{articles[2].headline}</div>
                                    <div className="flex flex-row-reverse flex-1 min-h-0 gap-4 text-black">
                                        <AutoFitText 
                                            value={articles[2].content} 
                                            onChange={text => { const n = [...articles]; n[2].content = text; setArticles(n); }}
                                            onOverflowStateChange={handleOverflowUpdate}
                                            className="flex-1 text-lg font-medium focus:bg-yellow-50 h-full text-black"
                                        />
                                        <div className="shrink-0 flex flex-col justify-start h-full aspect-[3/4] text-black"><ImageBlock image={articles[2].image} onImageChange={(url) => { const n = [...articles]; n[2].image = url; setArticles(n); }} className="w-full" /></div>
                                    </div>
                                </div>
                                <div className="w-[24%] shrink-0 flex flex-col h-full border-[3px] border-black bg-gray-50 p-1 font-serif text-black">
                                    <AutoFitText 
                                        value={reflection} 
                                        onChange={setReflection}
                                        onOverflowStateChange={handleOverflowUpdate}
                                        className="flex-1 text-lg focus:bg-white h-full text-black"
                                        placeholder="感想などを書いてね"
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
